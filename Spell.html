<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ㄅㄆㄇ拼拼看">
<meta name="theme-color" content="#FF6B9D">
<title>ㄅㄆㄇ拼拼看 🌟</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
:root {
  --pink:#FF6B9D; --purple:#9B59B6; --blue:#5DADE2;
  --yellow:#F7DC6F; --green:#58D68D; --orange:#F0A500;
  --red:#E74C3C; --bg:#FFF5F9; --card:#FFFFFF; --text:#2C3E50; --soft:#F8E8F0;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Nunito','Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;user-select:none;}
.screen{display:none;min-height:100vh;}
.screen.active{display:flex;flex-direction:column;}

/* HOME */
#home{background:linear-gradient(160deg,#FF6B9D 0%,#C850C0 50%,#4158D0 100%);align-items:center;justify-content:center;padding:24px 20px;}
.home-hero{text-align:center;color:white;margin-bottom:32px;}
.home-title{font-size:52px;font-weight:900;letter-spacing:8px;text-shadow:0 4px 20px rgba(0,0,0,.2);animation:bounce 2s ease-in-out infinite;display:block;}
.home-subtitle{font-size:19px;font-weight:600;opacity:.9;margin-top:6px;}
.stars-row{font-size:26px;margin:10px 0;animation:twinkle 1.5s ease-in-out infinite alternate;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
@keyframes twinkle{from{opacity:.7}to{opacity:1}}

/* UNIT SELECTOR */
.unit-scroll{width:100%;max-width:420px;margin-bottom:18px;}
.unit-scroll-label{color:rgba(255,255,255,.85);font-size:13px;font-weight:700;margin-bottom:8px;text-align:center;}
.unit-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
.unit-chip{background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.45);color:white;border-radius:50px;padding:7px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;}
.unit-chip.active,.unit-chip:active{background:white;color:var(–purple);}

/* START BUTTON */
.start-btn{background:white;color:var(–purple);border:none;border-radius:50px;padding:16px 52px;font-size:20px;font-weight:900;cursor:pointer;font-family:inherit;box-shadow:0 8px 28px rgba(0,0,0,.2);margin-top:8px;transition:transform .15s;}
.start-btn:active{transform:scale(.96);}
.word-count-badge{color:rgba(255,255,255,.8);font-size:13px;margin-top:10px;font-weight:600;}

/* GAME HEADER */
#game{background:var(–bg);}
.game-header{background:white;padding:12px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 12px rgba(0,0,0,.08);position:sticky;top:0;z-index:10;}
.back-btn{width:36px;height:36px;background:var(–soft);border:none;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.progress-wrap{flex:1;}
.progress-bar{height:10px;background:#EEE;border-radius:10px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(–pink),var(–purple));border-radius:10px;transition:width .4s ease;}
.progress-text{font-size:11px;color:#AAA;margin-top:2px;text-align:right;}
.score-badge{background:var(–yellow);border-radius:50px;padding:4px 12px;font-weight:800;font-size:14px;flex-shrink:0;}

/* QUESTION AREA */
.question-area{flex:1;display:flex;flex-direction:column;align-items:center;padding:16px 16px 0;}
.q-label{background:var(–soft);color:var(–pink);border-radius:50px;padding:4px 14px;font-size:13px;font-weight:700;margin-bottom:14px;}
.speak-card{background:white;border:3px solid var(–pink);border-radius:24px;padding:18px 28px;cursor:pointer;box-shadow:0 6px 20px rgba(255,107,157,.22);transition:transform .15s;margin-bottom:10px;display:flex;flex-direction:column;align-items:center;gap:6px;width:100%;max-width:320px;}
.speak-card:active{transform:scale(.97);}
.speak-card.speaking{animation:pulse .6s ease-in-out infinite alternate;border-color:var(–purple);background:var(–soft);}
@keyframes pulse{from{box-shadow:0 6px 20px rgba(155,89,182,.3)}to{box-shadow:0 6px 40px rgba(155,89,182,.6)}}
.speak-card .char{font-size:68px;font-weight:900;line-height:1.1;}
.speak-card .hint-text{font-size:13px;color:#AAA;}
.feedback-bar{font-size:15px;font-weight:700;min-height:24px;margin-bottom:4px;color:#888;}

/* KEYBOARD */
.keyboard-area{background:#EDEEF2;padding:10px 6px 28px;width:100%;}
.input-display{background:white;border-radius:14px;padding:10px 14px;margin:0 6px 8px;font-size:30px;font-weight:800;min-height:52px;display:flex;align-items:center;gap:6px;border:3px solid #DDD;color:var(–text);transition:border-color .3s,background .3s;}
.input-display .cursor{width:2px;height:30px;background:var(–pink);animation:blink 1s step-end infinite;flex-shrink:0;}
@keyframes blink{50%{opacity:0}}
.bopo-rows{display:flex;flex-direction:column;gap:5px;}
.bopo-row{display:flex;justify-content:center;gap:4px;}
.bopo-key{background:white;border:2px solid #CCC;border-bottom:3px solid #BBB;border-radius:9px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 3px rgba(0,0,0,.08);transition:all .1s;font-family:inherit;color:var(–text);padding:0;width:38px;height:38px;flex-shrink:0;}
.bopo-key:active{transform:translateY(1px);box-shadow:none;border-bottom-width:2px;background:var(–soft);}
.bopo-key.tone-key{background:#FFF0F5;border-color:#FFB3D1;}
.bopo-key.delete-key{background:#FFF0F5;border-color:#FFB3D1;font-size:18px;width:50px;}
.bopo-key.submit-key{background:var(–green);border-color:#27AE60;color:white;font-size:22px;width:64px;}

/* TAB BAR */
.tab-bar{display:flex;background:white;border-radius:50px;padding:4px;gap:4px;margin-bottom:24px;box-shadow:0 4px 16px rgba(0,0,0,.15);}
.tab-btn{flex:1;border:none;border-radius:50px;padding:10px 0;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;color:rgba(255,255,255,.7);background:transparent;transition:all .2s;}
.tab-btn.active{background:white;color:var(–purple);box-shadow:0 2px 8px rgba(0,0,0,.12);}

/* CUSTOM SCREEN */
#custom{background:linear-gradient(160deg,#FF6B9D 0%,#C850C0 50%,#4158D0 100%);padding:20px 16px 32px;align-items:center;}
.custom-header{color:white;text-align:center;margin-bottom:20px;}
.custom-header h2{font-size:24px;font-weight:900;margin-bottom:4px;}
.custom-header p{font-size:13px;opacity:.85;}
.custom-card{background:white;border-radius:20px;padding:20px;width:100%;max-width:420px;margin-bottom:14px;box-shadow:0 8px 24px rgba(0,0,0,.12);}
.custom-card h3{font-size:15px;font-weight:800;color:var(–purple);margin-bottom:14px;}
.input-row{display:flex;gap:8px;align-items:center;margin-bottom:10px;}
.input-row label{font-size:13px;font-weight:700;color:#888;width:32px;flex-shrink:0;}
.text-input{flex:1;border:2px solid #EEE;border-radius:10px;padding:10px 12px;font-size:18px;font-family:inherit;color:var(–text);outline:none;transition:border-color .2s;}
.text-input:focus{border-color:var(–pink);}
.add-btn{background:linear-gradient(135deg,var(–pink),var(–purple));color:white;border:none;border-radius:12px;padding:12px 20px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;width:100%;margin-top:4px;box-shadow:0 4px 12px rgba(255,107,157,.3);}
.add-btn:active{transform:scale(.97);}
.custom-list{width:100%;max-width:420px;display:flex;flex-direction:column;gap:8px;margin-bottom:80px;}
.custom-item{background:white;border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 3px 10px rgba(0,0,0,.08);}
.custom-item .item-char{font-size:28px;font-weight:900;color:var(–text);min-width:36px;}
.custom-item .item-bopo{font-size:16px;color:var(–purple);font-weight:700;flex:1;}
.custom-item .del-btn{background:#FFF0F5;border:none;border-radius:50%;width:30px;height:30px;font-size:16px;cursor:pointer;color:var(–red);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.custom-empty{color:rgba(255,255,255,.7);font-size:14px;text-align:center;padding:20px;}
.play-custom-btn{background:white;color:var(–purple);border:none;border-radius:50px;padding:14px 40px;font-size:18px;font-weight:900;cursor:pointer;font-family:inherit;box-shadow:0 8px 24px rgba(0,0,0,.15);position:fixed;bottom:24px;left:50%;transform:translateX(-50%);display:none;white-space:nowrap;}

/* RESULT OVERLAY */
.result-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px);}
.result-overlay.show{display:flex;}
.result-card{background:white;border-radius:28px;padding:34px 26px;text-align:center;max-width:320px;width:90%;animation:popIn .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.result-emoji{font-size:68px;display:block;margin-bottom:10px;}
.result-title{font-size:26px;font-weight:900;margin-bottom:6px;}
.result-score{font-size:17px;color:#888;margin-bottom:20px;}
.result-stars{font-size:34px;letter-spacing:8px;margin-bottom:22px;}
.result-btns{display:flex;flex-direction:column;gap:10px;}
.result-btn{border:none;border-radius:50px;padding:13px 20px;font-size:17px;font-weight:800;cursor:pointer;font-family:inherit;display:block;width:100%;}
.result-btn.primary{background:linear-gradient(135deg,var(–pink),var(–purple));color:white;box-shadow:0 6px 20px rgba(255,107,157,.4);}
.result-btn.secondary{background:var(–soft);color:var(–purple);}

/* CONFETTI */
.confetti-container{position:fixed;inset:0;pointer-events:none;z-index:200;}
.confetti-piece{position:absolute;border-radius:2px;animation:confettiFall var(–dur) ease-in forwards;}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

/* correct/wrong flash */
.input-display.correct{border-color:var(–green)!important;background:#E8F8EF!important;}
.input-display.wrong{border-color:var(–red)!important;background:#FDEDEC!important;animation:shakeInput .4s ease;}
@keyframes shakeInput{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
</style>

</head>
<body>

<!-- HOME -->

<div class="screen active" id="home">
  <div class="tab-bar">
    <button class="tab-btn active" id="tabCourse" onclick="switchTab('course')">📚 課次</button>
    <button class="tab-btn" id="tabCustom" onclick="switchTab('custom')">✏️ 自訂</button>
  </div>

  <!-- 課次面板 -->

  <div id="panelCourse">
  <div class="home-hero">
    <span class="home-title">ㄅㄆㄇ</span>
    <div class="stars-row">⭐🌟✨🌟⭐</div>
    <div class="home-subtitle">拼拼看！小一注音練習</div>
  </div>

  <div class="unit-scroll">
    <div class="unit-scroll-label">📚 選擇課次（可多選）</div>
    <div class="unit-chips" id="unitChips"></div>
  </div>

<button class="start-btn" id="startBtn" onclick="startGame()">開始遊戲 🎮</button>

  <div class="word-count-badge" id="wordCountBadge">已選 0 個字</div>
  </div><!-- /panelCourse -->

  <!-- 自訂面板 -->

  <div id="panelCustom" style="display:none;width:100%;display:none;flex-direction:column;align-items:center;">
    <div class="custom-header">
      <h2>✏️ 自訂單字</h2>
      <p>加入你想練習的字，隨時可以刪除</p>
    </div>
    <div class="custom-card">
      <h3>新增單字／詞</h3>
      <div class="input-row">
        <label>字</label>
        <input class="text-input" id="inputChar" placeholder="例：蝴蝶" maxlength="6">
      </div>
      <div class="input-row">
        <label>注音</label>
        <input class="text-input" id="inputBopo" placeholder="例：ㄏㄨˊㄉㄧㄝˊ" maxlength="20">
      </div>
      <button class="add-btn" onclick="addCustomWord()">＋ 新增</button>
    </div>
    <div class="custom-list" id="customList"></div>
  </div>

<button class="play-custom-btn" id="playCustomBtn" onclick="startCustomGame()">▶ 開始練習自訂字</button>

</div>

<!-- GAME -->

<div class="screen" id="game">
  <div class="game-header">
    <button class="back-btn" id="backBtn">←</button>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-text" id="progressText">0 / 0</div>
    </div>
    <div class="score-badge">⭐ <span id="scoreDisplay">0</span></div>
  </div>
  <div class="question-area" id="questionArea"></div>
  <div class="keyboard-area" id="keyboardArea">
    <div class="input-display" id="inputDisplay">
      <span id="inputText"></span><div class="cursor"></div>
    </div>
    <div class="bopo-rows" id="bopoRows"></div>
  </div>
</div>

<!-- RESULT -->

<div class="result-overlay" id="resultOverlay">
  <div class="result-card">
    <span class="result-emoji" id="resultEmoji">🎉</span>
    <div class="result-title" id="resultTitle">太棒了！</div>
    <div class="result-score" id="resultScore">答對 8 / 10 題</div>
    <div class="result-stars" id="resultStars">⭐⭐⭐</div>
    <div class="result-btns">
      <button class="result-btn primary" id="resultAgainBtn">再玩一次！</button>
      <button class="result-btn secondary" onclick="goHome()">回選課次</button>
    </div>
  </div>
</div>

<div class="confetti-container" id="confettiContainer"></div>

<script>

// 一年級國語生字表
// =====================================================================

var audioCtx = null;
var audioUnlocked = false;

function getACtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') { audioCtx.resume(); }
  return audioCtx;
}

function unlockAudio() {
  if (audioUnlocked) { return; }
  audioUnlocked = true;
  getACtx();
}
document.addEventListener('touchstart', unlockAudio);
document.addEventListener('mousedown', unlockAudio);

function playTone(freq, type, dur, vol) {
  vol = vol || 0.3;
  try {
    var ctx = getACtx();
    var o = ctx.createOscillator();
    var g = ctx.createGain();
    o.connect(g);
    g.connect(ctx.destination);
    o.type = type;
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    o.start();
    o.stop(ctx.currentTime + dur);
  } catch(e) {}
}

function sfxCorrect() {
  playTone(523, 'sine', 0.12, 0.28);
  setTimeout(function(){ playTone(659, 'sine', 0.12, 0.28); }, 120);

}

function sfxCelebrate() {
  var notes = [523,659,784,1047,784,1047,1319];
  for (var i = 0; i < notes.length; i++) {
    (function(n, delay){ setTimeout(function(){ playTone(n,'sine',0.18,0.28); }, delay); })(notes[i], i*90);
  }
}

function speak(text, rate) {
  if (!window.speechSynthesis) { return; }
  rate = rate || 0.82;
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-TW';
  u.rate = rate;
  u.pitch = 1.15;
  window.speechSynthesis.speak(u);
}

var TONE_IDX = {'ˊ':1,'ˇ':2,'ˋ':3,'˙':4};

function bopoToSpeech(bopo) {
  var toneMarks = ['ˊ','ˇ','ˋ','˙'];
  var lastChar = bopo.charAt(bopo.length - 1);
  var hasTone = false;
  var i;
  for (i = 0; i < toneMarks.length; i++) {
    if (toneMarks[i] === lastChar) { hasTone = true; break; }
  }
  var toneName = hasTone ? TONE_NAMES[lastChar] : '一聲';
  var tIdx = hasTone ? TONE_IDX[lastChar] : 0;
  var symbols = hasTone ? bopo.slice(0, bopo.length - 1) : bopo;
  // 查整串注音組合對應的代表字
  var entry = BOPO_WORD[bopo] || BOPO_WORD[symbols];
  var speechChar = entry ? entry[tIdx] : symbols;
  return { speechChars: speechChar, symbols: symbols, toneName: toneName };
}

function speakQuestion(char) { speak(char, 0.75); }

function splitBopo(symbols) {
  // 每個注音符號中間插頓號，讓 TTS 分開唸
  var result = '';
  for (var i = 0; i < symbols.length; i++) {
    result += symbols.charAt(i);
    if (i < symbols.length - 1) { result += '、'; }
  }
  return result;
}

function speakCorrectResult(char, bopo) {
  var r = bopoToSpeech(bopo);
  speak('答對了！' + splitBopo(r.symbols) + '、' + char + '、' + r.toneName + '、' + char, 0.75);
}

function speakWrongResult(char, bopo) {
  var r = bopoToSpeech(bopo);
  speak('答錯了。' + splitBopo(r.symbols) + '、' + char + '、' + r.toneName + '、' + char, 0.75);
}

// =====================================================================
// HOME
// =====================================================================
function buildHome() {
  var chips = document.getElementById('unitChips');
  chips.innerHTML = '';

  // 全部課次 button
  var allBtn = document.createElement('button');
  allBtn.className = 'unit-chip';
  allBtn.style.background = 'rgba(255,255,255,0.35)';
  allBtn.textContent = '✨ 全部課次';
  allBtn.onclick = function() {
    sfxClick();
    var allIds = [];
    for (var k = 0; k < UNITS.length; k++) { allIds.push(UNITS[k].id); }
    var allSelected = allIds.length === state.selectedUnits.length;
    if (allSelected) {
      state.selectedUnits = [];
      var cs = chips.querySelectorAll('.unit-chip');
      for (var x = 0; x < cs.length; x++) { cs[x].classList.remove('active'); }
    } else {
      state.selectedUnits = allIds.slice();
      var cs2 = chips.querySelectorAll('.unit-chip');
      for (var y = 0; y < cs2.length; y++) { cs2[y].classList.add('active'); }
    }
    updateWordCount();
  };
  chips.appendChild(allBtn);

  for (var i = 0; i < UNITS.length; i++) {
    (function(u) {
      var btn = document.createElement('button');
      btn.className = 'unit-chip';
      btn.textContent = u.label + '「' + u.name + '」';
      btn.onclick = function() {
        sfxClick();
        var idx2 = state.selectedUnits.indexOf(u.id);
        if (idx2 >= 0) {
          state.selectedUnits.splice(idx2, 1);
          btn.classList.remove('active');
        } else {
          state.selectedUnits.push(u.id);
          btn.classList.add('active');
        }
        updateWordCount();
      };
      chips.appendChild(btn);
    })(UNITS[i]);
  }
  updateWordCount();
}

function updateWordCount() {
  var words = getSelectedWords();
  document.getElementById('wordCountBadge').textContent = '已選 ' + words.length + ' 個字';
}

function getSelectedWords() {
  var result = [];
  for (var i = 0; i < UNITS.length; i++) {
    if (state.selectedUnits.length === 0 || state.selectedUnits.indexOf(UNITS[i].id) >= 0) {
      for (var j = 0; j < UNITS[i].words.length; j++) {
        result.push(UNITS[i].words[j]);
      }
    }
  }
  return result;
}

// =====================================================================
// GAME
// =====================================================================
function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function startGame() {
  var words = getSelectedWords();
  if (words.length === 0) { speak('請先選擇課次！'); return; }
  sfxClick();
  state.questions = shuffle(words);
  state.total = state.questions.length;
  state.current = 0;
  state.score = 0;
  state.typed = '';
  state.answered = false;

  document.getElementById('home').classList.remove('active');
  document.getElementById('game').classList.add('active');

  buildKeyboard();
  renderQuestion();
  updateProgress();
  setTimeout(function(){ speak('開始囉！請輸入這個字的注音！', 0.85); }, 400);
}

function renderQuestion() {
  var q = state.questions[state.current];
  state.answered = false;
  state.typed = '';

  var area = document.getElementById('questionArea');
  area.innerHTML =
    '<div class="q-label">⌨️ 輸入注音</div>' +
    '<button class="speak-card" id="speakCard" onclick="speakNow()">' +
      '<span class="char">' + q.char + '</span>' +
      '<span class="hint-text">點我聽發音 🔊</span>' +
    '</button>' +
    '<div class="feedback-bar" id="feedbackBar"></div>';

  var disp = document.getElementById('inputDisplay');
  disp.className = 'input-display';
  document.getElementById('inputText').textContent = '';

  setTimeout(function(){ speakQuestion(q.char); }, 350);
}

function speakNow() {
  var q = state.questions[state.current];
  var card = document.getElementById('speakCard');
  card.classList.add('speaking');
  speakQuestion(q.char);
  setTimeout(function(){ card.classList.remove('speaking'); }, 1400);
}

function typeKey(key) {
  if (state.answered) { return; }
  sfxClick();
  state.typed += key;
  document.getElementById('inputText').textContent = state.typed;
  speak(key, 0.9);
}

function deleteKey() {
  if (state.answered) { return; }
  sfxClick();
  state.typed = state.typed.slice(0, state.typed.length - 1);
  document.getElementById('inputText').textContent = state.typed;
}

function submitAnswer() {
  if (state.answered || !state.typed) { return; }
  var q = state.questions[state.current];
  state.answered = true;
  var disp = document.getElementById('inputDisplay');
  var fb = document.getElementById('feedbackBar');

  if (state.typed === q.bopo) {
    disp.classList.add('correct');
    sfxCorrect();
    state.score++;
    fb.style.color = '#1E8449';
    fb.textContent = '✅ 答對了！';
    setTimeout(function(){ speakCorrectResult(q.char, q.bopo); }, 400);
  } else {
    disp.classList.add('wrong');
    sfxWrong();
    fb.style.color = '#E74C3C';
    fb.textContent = '❌ 正確答案：' + q.bopo;
    document.getElementById('inputText').textContent = q.bopo;
    setTimeout(function(){ speakWrongResult(q.char, q.bopo); }, 400);
  }
  updateProgress();
  setTimeout(function() {
    var spoken = false;
    function goNext() {
      if (spoken) { return; }
      spoken = true;
      setTimeout(nextQuestion, 600);
    }
    if (window.speechSynthesis) {
      var check = setInterval(function() {
        if (!window.speechSynthesis.speaking) {
          clearInterval(check);
          goNext();
        }
      }, 200);
      // fallback: max 6 seconds
      setTimeout(function() { clearInterval(check); goNext(); }, 6000);
    } else {
      setTimeout(nextQuestion, 1500);
    }
  }, 400);
}

function nextQuestion() {
  state.current++;
  if (state.current >= state.total) {
    showResult();
  } else {
    renderQuestion();
  }
}

function updateProgress() {
  var pct = (state.current / state.total) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = state.current + ' / ' + state.total;
  document.getElementById('scoreDisplay').textContent = state.score;
}

function buildKeyboard() {
  var rows = document.getElementById('bopoRows');
  rows.innerHTML = '';
  for (var r = 0; r < BOPO_LAYOUT.length; r++) {
    var rowEl = document.createElement('div');
    rowEl.className = 'bopo-row';
    for (var k = 0; k < BOPO_LAYOUT[r].length; k++) {
      (function(key) {
        var btn = document.createElement('button');
        var isTone = TONES.indexOf(key) >= 0;
        btn.className = 'bopo-key' + (isTone ? ' tone-key' : '');
        btn.textContent = key;
        btn.ontouchstart = function(e) { e.preventDefault(); typeKey(key); };
        btn.onclick = function() { typeKey(key); };
        rowEl.appendChild(btn);
      })(BOPO_LAYOUT[r][k]);
    }
    rows.appendChild(rowEl);
  }
  // action row
  var ar = document.createElement('div');
  ar.className = 'bopo-row';
  ar.style.marginTop = '4px';

  var del = document.createElement('button');
  del.className = 'bopo-key delete-key';
  del.innerHTML = '⌫';
  del.ontouchstart = function(e) { e.preventDefault(); deleteKey(); };
  del.onclick = deleteKey;

  var sub = document.createElement('button');
  sub.className = 'bopo-key submit-key';
  sub.innerHTML = '✓';
  sub.ontouchstart = function(e) { e.preventDefault(); submitAnswer(); };
  sub.onclick = submitAnswer;

  ar.appendChild(del);
  ar.appendChild(sub);
  rows.appendChild(ar);
}

// =====================================================================
// RESULT
// =====================================================================
function showResult() {
  var pct = state.score / state.total;
  var emoji, title, stars;
  if (pct >= 0.9)      { emoji='🏆'; title='超厲害！';    stars='⭐⭐⭐'; sfxCelebrate(); spawnConfetti(); }
  else if (pct >= 0.7) { emoji='🎉'; title='做得很好！';  stars='⭐⭐';   sfxCorrect(); }
  else if (pct >= 0.5) { emoji='💪'; title='繼續加油！';  stars='⭐';    sfxCorrect(); }
  else                 { emoji='😊'; title='再練習一次！'; stars='';      sfxCorrect(); }

  document.getElementById('resultEmoji').textContent  = emoji;
  document.getElementById('resultTitle').textContent  = title;
  document.getElementById('resultScore').textContent  = '答對 ' + state.score + ' / ' + state.total + ' 題';
  document.getElementById('resultStars').textContent  = stars;
  document.getElementById('resultOverlay').classList.add('show');
  speak(title + ' 你答對了 ' + state.score + ' 題！', 0.85);

  document.getElementById('resultAgainBtn').onclick = function() {
    sfxClick();
    document.getElementById('resultOverlay').classList.remove('show');
    state.questions = shuffle(getSelectedWords());
    state.total = state.questions.length;
    state.current = 0; state.score = 0; state.typed = ''; state.answered = false;
    renderQuestion();
    updateProgress();
  };
}

function goHome() {
  sfxClick();
  if (window.speechSynthesis) { window.speechSynthesis.cancel(); }
  document.getElementById('resultOverlay').classList.remove('show');
  document.getElementById('game').classList.remove('active');
  document.getElementById('home').classList.add('active');
}

function spawnConfetti() {
  var c = document.getElementById('confettiContainer');
  c.innerHTML = '';
  var cols = ['#FF6B9D','#9B59B6','#5DADE2','#F7DC6F','#58D68D','#F0A500'];
  for (var i = 0; i < 70; i++) {
    (function() {
      var p = document.createElement('div');
      p.className = 'confetti-piece';
      p.style.left = (Math.random()*100) + 'vw';
      p.style.background = cols[Math.floor(Math.random()*cols.length)];
      var dur = (1.5 + Math.random()*2).toFixed(2) + 's';
      p.style.cssText += ';--dur:' + dur;
      p.style.animationDelay = (Math.random()*0.6).toFixed(2) + 's';
      var sz = (6 + Math.random()*8).toFixed(0) + 'px';
      p.style.width = sz; p.style.height = sz;
      c.appendChild(p);
    })();
  }
  setTimeout(function(){ c.innerHTML=''; }, 4500);
}

// =====================================================================
// CUSTOM WORDS
// =====================================================================
var customWords = [];

function switchTab(tab) {
  sfxClick();
  var course = document.getElementById('panelCourse');
  var custom = document.getElementById('panelCustom');
  var playBtn = document.getElementById('playCustomBtn');
  var tCourse = document.getElementById('tabCourse');
  var tCustom = document.getElementById('tabCustom');
  if (tab === 'course') {
    course.style.display = '';
    custom.style.display = 'none';
    playBtn.style.display = 'none';
    tCourse.classList.add('active');
    tCustom.classList.remove('active');
  } else {
    course.style.display = 'none';
    custom.style.display = 'flex';
    playBtn.style.display = customWords.length > 0 ? 'block' : 'none';
    tCustom.classList.add('active');
    tCourse.classList.remove('active');
    renderCustomList();
  }
}

function addCustomWord() {
  var charEl = document.getElementById('inputChar');
  var bopoEl = document.getElementById('inputBopo');
  var ch = charEl.value.trim();
  var bp = bopoEl.value.trim();
  if (!ch || !bp) { speak('請輸入文字和注音！'); return; }
  sfxCorrect();
  customWords.push({ char: ch, bopo: bp });
  charEl.value = '';
  bopoEl.value = '';
  renderCustomList();
  document.getElementById('playCustomBtn').style.display = 'block';
  speak(ch);
}

function renderCustomList() {
  var list = document.getElementById('customList');
  if (customWords.length === 0) {
    list.innerHTML = '<div class="custom-empty">還沒有自訂單字<br>在上面新增吧！</div>';
    return;
  }
  list.innerHTML = '';
  for (var i = 0; i < customWords.length; i++) {
    (function(idx) {
      var item = document.createElement('div');
      item.className = 'custom-item';
      var charSpan = document.createElement('span');
      charSpan.className = 'item-char';
      charSpan.textContent = customWords[idx].char;
      var bopoSpan = document.createElement('span');
      bopoSpan.className = 'item-bopo';
      bopoSpan.textContent = customWords[idx].bopo;
      var delBtn = document.createElement('button');
      delBtn.className = 'del-btn';
      delBtn.innerHTML = '✕';
      delBtn.onclick = function() {
        sfxClick();
        customWords.splice(idx, 1);
        renderCustomList();
        if (customWords.length === 0) {
          document.getElementById('playCustomBtn').style.display = 'none';
        }
      };
      // tap char to hear it
      charSpan.onclick = function() { speak(customWords[idx].char); };
      item.appendChild(charSpan);
      item.appendChild(bopoSpan);
      item.appendChild(delBtn);
      list.appendChild(item);
    })(i);
  }
}

function startCustomGame() {
  if (customWords.length === 0) { speak('請先新增自訂單字！'); return; }
  sfxClick();
  state.questions = shuffle(customWords.slice());
  state.total = state.questions.length;
  state.current = 0; state.score = 0; state.typed = ''; state.answered = false;
  document.getElementById('home').classList.remove('active');
  document.getElementById('game').classList.add('active');
  buildKeyboard();
  renderQuestion();
  updateProgress();
  setTimeout(function(){ speak('開始囉！請輸入這個字的注音！', 0.85); }, 400);
}

document.getElementById('backBtn').addEventListener('click', function() {
  sfxClick();
  if (window.speechSynthesis) { window.speechSynthesis.cancel(); }
  document.getElementById('game').classList.remove('active');
  document.getElementById('home').classList.add('active');
});

window.onload = function() {
  buildHome();
  setTimeout(function(){ speak('歡迎！請選擇要練習的課次，然後按開始遊戲！'); }, 800);
};
