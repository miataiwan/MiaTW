<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="算數遊戲">
<title>🌟 算數遊戲</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');

:root {
–pink:    #FF6B9D;
–purple:  #9B59E8;
–yellow:  #FFD93D;
–mint:    #4ECDC4;
–coral:   #FF6B6B;
–bg:      #FFF0F8;
–card:    #FFFFFF;
–text:    #3D2068;
–radius:  24px;
}

- { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
font-family: ‘Nunito’, ‘Helvetica Neue’, sans-serif;
background: var(–bg);
min-height: 100dvh;
display: flex;
flex-direction: column;
align-items: center;
overflow-x: hidden;
}

/* ─── SCREENS ─── */
.screen { display: none; width: 100%; max-width: 420px; min-height: 100dvh; flex-direction: column; align-items: center; padding: 24px 20px 32px; }
.screen.active { display: flex; }

/* ─── HOME SCREEN ─── */
#home { background: linear-gradient(160deg, #FFE4F3 0%, #EDE4FF 100%); justify-content: center; gap: 20px; }
.home-logo { font-size: 80px; animation: bounce 2s ease-in-out infinite; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
.home-title { font-size: 36px; font-weight: 900; color: var(–text); text-align: center; line-height: 1.2; }
.home-title span { color: var(–pink); }
.home-sub { font-size: 18px; color: #9B59E8; font-weight: 700; }

/* ─── OPERATION GRID ─── */
.op-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; width: 100%; margin-top: 8px; }
.op-btn {
border: none; border-radius: 20px; padding: 22px 10px;
font-family: inherit; font-size: 28px; font-weight: 900; cursor: pointer;
display: flex; flex-direction: column; align-items: center; gap: 6px;
transition: transform .12s, box-shadow .12s;
box-shadow: 0 6px 0 rgba(0,0,0,.15);
}
.op-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,.15); }
.op-btn .op-symbol { font-size: 42px; }
.op-btn .op-name   { font-size: 20px; }
.op-add    { background: linear-gradient(135deg,#FF9A9E,#FAD0C4); color: #7B1E3C; }
.op-sub    { background: linear-gradient(135deg,#A18CD1,#FBC2EB); color: #3D0073; }
.op-mul    { background: linear-gradient(135deg,#FDDB92,#D1FDBE); color: #5A4000; }
.op-div    { background: linear-gradient(135deg,#84FAB0,#8FD3F4); color: #003A5C; }

/* ─── LEVEL SCREEN ─── */
#level-select { justify-content: flex-start; gap: 20px; padding-top: 40px; }
.back-btn {
align-self: flex-start; background: white; border: none; border-radius: 50px;
padding: 10px 20px; font-family: inherit; font-size: 20px; font-weight: 800;
color: var(–purple); cursor: pointer; box-shadow: 0 4px 12px rgba(0,0,0,.1);
}
.screen-title { font-size: 26px; font-weight: 900; color: var(–text); }
.level-cards { width: 100%; display: flex; flex-direction: column; gap: 14px; }
.level-card {
border: none; border-radius: 20px; padding: 20px 24px;
font-family: inherit; cursor: pointer; text-align: left;
display: flex; align-items: center; gap: 16px;
box-shadow: 0 6px 0 rgba(0,0,0,.12); transition: transform .12s;
}
.level-card:active { transform: translateY(4px); }
.level-1 { background: linear-gradient(135deg,#D4FC79,#96E6A1); }
.level-2 { background: linear-gradient(135deg,#89F7FE,#66A6FF); }
.level-3 { background: linear-gradient(135deg,#F093FB,#F5576C); }
.level-star { font-size: 32px; }
.level-info .level-name  { font-size: 24px; font-weight: 900; color: var(–text); }
.level-info .level-desc  { font-size: 14px; font-weight: 700; color: rgba(61,32,104,.65); margin-top: 2px; }

/* ─── GAME SCREEN ─── */
#game { justify-content: flex-start; gap: 0; padding-top: 16px; }
.top-bar { width: 100%; display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.score-pill { background: white; border-radius: 50px; padding: 8px 18px; font-size: 18px; font-weight: 900; color: var(–purple); box-shadow: 0 3px 10px rgba(0,0,0,.1); }
.progress-bar-wrap { width: 100%; height: 12px; background: rgba(155,89,232,.15); border-radius: 99px; overflow: hidden; margin-bottom: 20px; }
.progress-bar-fill { height: 100%; background: linear-gradient(90deg,#FF6B9D,#9B59E8); border-radius: 99px; transition: width .4s; }

/* Question card */
.question-card {
width: 100%; background: white; border-radius: 28px;
padding: 28px 24px 24px; text-align: center;
box-shadow: 0 8px 32px rgba(155,89,232,.18);
margin-bottom: 20px; position: relative; overflow: hidden;
}
.question-card::before {
content: ‘’; position: absolute; top:-40px; right:-40px;
width:120px; height:120px; background: var(–yellow); border-radius:50%; opacity:.25;
}
.speak-btn {
border: none; background: linear-gradient(135deg,#FFD93D,#FF9A3C);
border-radius: 50%; width: 52px; height: 52px; font-size: 24px; cursor: pointer;
box-shadow: 0 4px 12px rgba(255,154,60,.4); margin-bottom: 12px;
transition: transform .1s;
}
.speak-btn:active { transform: scale(.92); }
.question-text { font-size: 52px; font-weight: 900; color: var(–text); letter-spacing: 2px; line-height: 1.1; }
.answer-display {
margin-top: 14px; background: var(–bg); border-radius: 16px;
padding: 14px; font-size: 48px; font-weight: 900; color: var(–purple);
min-height: 76px; letter-spacing: 4px; position: relative;
}
.cursor { display: inline-block; width: 3px; height: 44px; background: var(–pink); border-radius: 2px; vertical-align: middle; animation: blink 1s step-end infinite; margin-left: 2px; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* Number pad */
.numpad { width: 100%; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.num-key {
border: none; border-radius: 18px; padding: 0; height: 72px;
font-family: inherit; font-size: 30px; font-weight: 900; cursor: pointer;
background: white; color: var(–text);
box-shadow: 0 5px 0 rgba(0,0,0,.1); transition: transform .08s;
}
.num-key:active { transform: translateY(4px); box-shadow: 0 1px 0 rgba(0,0,0,.1); }
.num-key.zero  { grid-column: span 1; }
.num-key.del   { background: linear-gradient(135deg,#FFA8A8,#FF6B6B); color: white; }
.num-key.ok    { background: linear-gradient(135deg,#84FAB0,#0FD86D); color: white; font-size: 24px; }
.num-key.ok.full-width { grid-column: span 3; height: 64px; font-size: 26px; }

/* ─── FEEDBACK OVERLAY ─── */
.feedback-overlay {
position: fixed; inset: 0; display: flex; flex-direction: column;
align-items: center; justify-content: center; z-index: 100;
pointer-events: none; opacity: 0; transition: opacity .2s;
}
.feedback-overlay.show { opacity: 1; pointer-events: all; }
.feedback-emoji { font-size: 100px; animation: popIn .35s cubic-bezier(.34,1.56,.64,1); }
.feedback-msg { font-size: 36px; font-weight: 900; margin-top: 12px; text-shadow: 0 3px 8px rgba(0,0,0,.2); animation: popIn .35s .05s both cubic-bezier(.34,1.56,.64,1); }
@keyframes popIn { from{transform:scale(0) rotate(-15deg)} to{transform:scale(1) rotate(0)} }

/* ─── STARS ─── */
.star-burst { position: fixed; pointer-events: none; z-index: 99; }
.star-particle {
position: absolute; font-size: 28px;
animation: starFly 1s ease-out forwards;
}
@keyframes starFly {
0% { transform: translate(0,0) scale(1) rotate(0deg); opacity: 1; }
100% { transform: translate(var(–tx),var(–ty)) scale(0) rotate(360deg); opacity: 0; }
}

/* ─── RESULT SCREEN ─── */
#result { justify-content: center; gap: 20px; background: linear-gradient(160deg,#FFF0F8,#EDE4FF); }
.result-emoji { font-size: 90px; animation: bounce 1.5s ease-in-out infinite; }
.result-title { font-size: 32px; font-weight: 900; color: var(–text); text-align: center; }
.result-score-box { background: white; border-radius: 24px; padding: 20px 40px; text-align: center; box-shadow: 0 8px 24px rgba(155,89,232,.15); }
.result-score { font-size: 64px; font-weight: 900; color: var(–purple); }
.result-label { font-size: 18px; color: #9B59E8; font-weight: 700; }
.result-stars { font-size: 42px; letter-spacing: 6px; }
.btn-row { display: flex; gap: 12px; width: 100%; }
.big-btn {
flex: 1; border: none; border-radius: 20px; padding: 18px 10px;
font-family: inherit; font-size: 20px; font-weight: 900; cursor: pointer;
box-shadow: 0 6px 0 rgba(0,0,0,.15); transition: transform .12s;
}
.big-btn:active { transform: translateY(4px); }
.btn-home  { background: linear-gradient(135deg,#FBC2EB,#A18CD1); color: var(–text); }
.btn-retry { background: linear-gradient(135deg,#84FAB0,#0FD86D); color: #003A2A; }

/* ─── ANIMATIONS ─── */
.shake { animation: shake .4s ease; }
@keyframes shake {
0%,100%{transform:translateX(0)}
20%{transform:translateX(-10px)}
40%{transform:translateX(10px)}
60%{transform:translateX(-8px)}
80%{transform:translateX(8px)}
}

/* Safe area bottom */
.safe-bottom { height: env(safe-area-inset-bottom, 0); }
</style>

</head>
<body>

<!-- ════════════ HOME ════════════ -->

<div id="home" class="screen active">
  <div class="home-logo">🌟</div>
  <div class="home-title">算數<span>遊戲</span></div>
  <div class="home-sub">選一個來玩！</div>
  <div class="op-grid">
    <button class="op-btn op-add" onclick="selectOp('add')">
      <span class="op-symbol">➕</span>
      <span class="op-name">加法</span>
    </button>
    <button class="op-btn op-sub" onclick="selectOp('sub')">
      <span class="op-symbol">➖</span>
      <span class="op-name">減法</span>
    </button>
    <button class="op-btn op-mul" onclick="selectOp('mul')">
      <span class="op-symbol">✖️</span>
      <span class="op-name">乘法</span>
    </button>
    <button class="op-btn op-div" onclick="selectOp('div')">
      <span class="op-symbol">➗</span>
      <span class="op-name">除法</span>
    </button>
  </div>
  <div class="safe-bottom"></div>
</div>

<!-- ════════════ LEVEL SELECT ════════════ -->

<div id="level-select" class="screen">
  <button class="back-btn" onclick="goHome()">← 回去</button>
  <div class="screen-title" id="level-title">選難易度</div>
  <div class="level-cards">
    <button class="level-card level-1" onclick="startGame(1)">
      <span class="level-star">⭐</span>
      <div class="level-info">
        <div class="level-name">簡單</div>
        <div class="level-desc" id="desc-1">答案是個位數（1–9）</div>
      </div>
    </button>
    <button class="level-card level-2" onclick="startGame(2)">
      <span class="level-star">⭐⭐</span>
      <div class="level-info">
        <div class="level-name">普通</div>
        <div class="level-desc" id="desc-2">答案是十位數（10–99）</div>
      </div>
    </button>
    <button class="level-card level-3" onclick="startGame(3)">
      <span class="level-star">⭐⭐⭐</span>
      <div class="level-info">
        <div class="level-name">困難</div>
        <div class="level-desc" id="desc-3">答案是百位數（100以上）</div>
      </div>
    </button>
  </div>
  <div class="safe-bottom"></div>
</div>

<!-- ════════════ GAME ════════════ -->

<div id="game" class="screen">
  <div class="top-bar">
    <button class="back-btn" onclick="goHome()" style="padding:8px 14px;font-size:18px;">← 回</button>
    <div class="score-pill">🌟 <span id="score-display">0</span></div>
    <div class="score-pill" id="q-counter">1 / 10</div>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>

  <div class="question-card" id="question-card">
    <button class="speak-btn" id="speak-btn" onclick="speakQuestion()">🔊</button>
    <div class="question-text" id="question-text">3 + 4 = ?</div>
    <div class="answer-display" id="answer-display"><span class="cursor"></span></div>
  </div>

  <div class="numpad">
    <button class="num-key" onclick="pressKey('7')">7</button>
    <button class="num-key" onclick="pressKey('8')">8</button>
    <button class="num-key" onclick="pressKey('9')">9</button>
    <button class="num-key" onclick="pressKey('4')">4</button>
    <button class="num-key" onclick="pressKey('5')">5</button>
    <button class="num-key" onclick="pressKey('6')">6</button>
    <button class="num-key" onclick="pressKey('1')">1</button>
    <button class="num-key" onclick="pressKey('2')">2</button>
    <button class="num-key" onclick="pressKey('3')">3</button>
    <button class="num-key zero" onclick="pressKey('0')">0</button>
    <button class="num-key del" onclick="pressKey('del')">⌫</button>
    <button class="num-key ok" onclick="pressKey('ok')">✓ 答</button>
  </div>
  <div class="safe-bottom"></div>
</div>

<!-- ════════════ RESULT ════════════ -->

<div id="result" class="screen">
  <div class="result-emoji" id="result-emoji">🎉</div>
  <div class="result-title" id="result-title">你好棒！</div>
  <div class="result-score-box">
    <div class="result-score"><span id="final-score">0</span> / 10</div>
    <div class="result-label">答對幾題</div>
    <div class="result-stars" id="result-stars">⭐⭐⭐</div>
  </div>
  <div class="btn-row">
    <button class="big-btn btn-retry" onclick="retryGame()">🔄 再玩</button>
    <button class="big-btn btn-home" onclick="goHome()">🏠 回家</button>
  </div>
  <div class="safe-bottom"></div>
</div>

<!-- Feedback overlay -->

<div class="feedback-overlay" id="feedback-overlay">
  <div class="feedback-emoji" id="feedback-emoji">😄</div>
  <div class="feedback-msg" id="feedback-msg">答對了！</div>
</div>

<script>
// ════════ STATE ════════
const state = {
  op: 'add',
  level: 1,
  questions: [],
  current: 0,
  score: 0,
  input: '',
  answered: false,
  totalQ: 10,
};

// ════════ AUDIO ════════
const ctx = new (window.AudioContext || window.webkitAudioContext)();

function playTone(freq, dur, type='sine', vol=0.4) {
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = type; osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
  osc.start(); osc.stop(ctx.currentTime + dur);
}

function playCorrect() {
  [523,659,784,1046].forEach((f,i) => setTimeout(()=>playTone(f,.18,'triangle',.5),i*80));
}
function playWrong() {
  playTone(200,.15,'sawtooth',.4);
  setTimeout(()=>playTone(150,.3,'sawtooth',.35),160);
}
function playClick() {
  playTone(880,.06,'sine',.25);
}

// ════════ SPEECH ════════
const opVoice = { add:'加', sub:'減', mul:'乘', div:'除' };
const opSign  = { add:'+', sub:'−', mul:'×', div:'÷' };

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-TW'; u.rate = 0.85; u.pitch = 1.2;
  window.speechSynthesis.speak(u);
}

function speakQuestion() {
  const q = state.questions[state.current];
  if (!q) return;
  const txt = `${q.a} ${opVoice[state.op]} ${q.b} 等於多少`;
  speak(txt);
}

// ════════ QUESTION GEN ════════
function genQuestion(op, level) {
  let a, b, ans;
  let tries = 0;
  while(tries++ < 200) {
    if (op === 'add') {
      if (level===1) { a=rnd(1,9); b=rnd(1,9-a); }
      else if (level===2) { a=rnd(1,90); b=rnd(10-a,99-a); if(b<1)b=1; }
      else { a=rnd(50,500); b=rnd(50,500); }
      ans = a+b;
    } else if (op === 'sub') {
      if (level===1) { a=rnd(2,9); b=rnd(1,a-1); }
      else if (level===2) { a=rnd(11,99); b=rnd(1,a-10); }
      else { a=rnd(150,999); b=rnd(100,a-100>0?a-100:50); }
      ans = a-b;
    } else if (op === 'mul') {
      if (level===1) { a=rnd(1,3); b=rnd(1,3); }
      else if (level===2) { a=rnd(2,9); b=rnd(2,9); }
      else { a=rnd(10,25); b=rnd(10,25); }
      ans = a*b;
    } else { // div
      if (level===1) { b=rnd(1,3); ans=rnd(1,3); a=b*ans; }
      else if (level===2) { b=rnd(2,9); ans=rnd(2,9); a=b*ans; }
      else { b=rnd(10,20); ans=rnd(10,20); a=b*ans; }
    }
    if (checkLevel(ans, level)) return {a,b,ans};
  }
  return {a:2,b:2,ans:4}; // fallback
}

function checkLevel(ans, lv) {
  if (lv===1) return ans>=1 && ans<=9;
  if (lv===2) return ans>=10 && ans<=99;
  return ans>=100;
}

function rnd(min,max) { return Math.floor(Math.random()*(max-min+1))+min; }

// ════════ NAVIGATION ════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function goHome() {
  window.speechSynthesis && window.speechSynthesis.cancel();
  showScreen('home');
}

function selectOp(op) {
  playClick();
  state.op = op;
  const opName = {add:'加法',sub:'減法',mul:'乘法',div:'除法'};
  document.getElementById('level-title').textContent = opName[op] + '——選難易度';
  showScreen('level-select');
  setTimeout(()=>speak('選一個難易度！'),300);
}

function startGame(level) {
  playClick();
  state.level = level;
  state.questions = Array.from({length:state.totalQ}, ()=>genQuestion(state.op, level));
  state.current = 0; state.score = 0; state.input = ''; state.answered = false;
  showScreen('game');
  renderQuestion();
  setTimeout(speakQuestion, 600);
}

function retryGame() {
  startGame(state.level);
}

// ════════ RENDER ════════
function renderQuestion() {
  const q = state.questions[state.current];
  document.getElementById('question-text').textContent =
    `${q.a} ${opSign[state.op]} ${q.b} = ?`;
  document.getElementById('answer-display').innerHTML = '<span class="cursor"></span>';
  document.getElementById('q-counter').textContent = `${state.current+1} / ${state.totalQ}`;
  document.getElementById('score-display').textContent = state.score;
  document.getElementById('progress-fill').style.width = `${(state.current/state.totalQ)*100}%`;
  state.input = ''; state.answered = false;
}

function renderInput() {
  const disp = document.getElementById('answer-display');
  disp.innerHTML = state.input
    ? state.input + '<span class="cursor"></span>'
    : '<span class="cursor"></span>';
}

// ════════ NUMPAD ════════
function pressKey(k) {
  if (ctx.state === 'suspended') ctx.resume();
  if (state.answered) return;
  if (k === 'del') {
    playClick();
    state.input = state.input.slice(0,-1);
    // Speak deleted digit or empty
    renderInput();
  } else if (k === 'ok') {
    submitAnswer();
  } else {
    if (state.input.length >= 5) return;
    state.input += k;
    playClick();
    speak(k); // speak the digit
    renderInput();
  }
}

// ════════ ANSWER CHECK ════════
function submitAnswer() {
  if (!state.input) return;
  const q = state.questions[state.current];
  const userAns = parseInt(state.input, 10);
  state.answered = true;

  if (userAns === q.ans) {
    state.score++;
    playCorrect();
    showFeedback(true);
    burstStars();
    speak('答對了！好棒！');
    setTimeout(nextQuestion, 1600);
  } else {
    playWrong();
    showFeedback(false);
    document.getElementById('question-card').classList.add('shake');
    setTimeout(()=>document.getElementById('question-card').classList.remove('shake'),400);
    speak(`答錯了，正確答案是 ${q.ans}`);
    setTimeout(()=>{
      hideFeedback();
      state.input = '';
      state.answered = false;
      renderInput();
    }, 2000);
  }
}

function nextQuestion() {
  hideFeedback();
  state.current++;
  if (state.current >= state.totalQ) {
    showResult();
  } else {
    renderQuestion();
    setTimeout(speakQuestion, 400);
  }
}

// ════════ FEEDBACK ════════
const CORRECT = ['😄','🥳','🌟','🎉','🦄','💖','👏'];
const WRONG   = ['😢','🤔','💪','😬'];

function showFeedback(correct) {
  const ol = document.getElementById('feedback-overlay');
  const emj = document.getElementById('feedback-emoji');
  const msg = document.getElementById('feedback-msg');
  emj.textContent = correct ? CORRECT[Math.floor(Math.random()*CORRECT.length)] : WRONG[Math.floor(Math.random()*WRONG.length)];
  msg.textContent = correct ? ['答對了！棒棒！','超厲害！','完美！','太聰明了！'][Math.floor(Math.random()*4)] : ['再想想看！','加油！','差一點！'][Math.floor(Math.random()*3)];
  msg.style.color = correct ? '#0FD86D' : '#FF6B6B';
  ol.style.background = correct ? 'rgba(255,255,255,.88)' : 'rgba(255,255,255,.82)';
  ol.classList.add('show');
}
function hideFeedback() {
  document.getElementById('feedback-overlay').classList.remove('show');
}

// ════════ STARS ════════
function burstStars() {
  const cx = window.innerWidth/2, cy = window.innerHeight/2;
  const wrap = document.createElement('div');
  wrap.className = 'star-burst';
  wrap.style.cssText = `left:${cx}px;top:${cy}px;`;
  const EMOJIS = ['⭐','🌟','✨','💫','🎀','💖'];
  for (let i=0;i<14;i++) {
    const s = document.createElement('div');
    s.className = 'star-particle';
    const angle = (i/14)*360;
    const dist = 80+Math.random()*120;
    const tx = Math.cos(angle*Math.PI/180)*dist;
    const ty = Math.sin(angle*Math.PI/180)*dist;
    s.style.setProperty('--tx',`${tx}px`);
    s.style.setProperty('--ty',`${ty}px`);
    s.textContent = EMOJIS[Math.floor(Math.random()*EMOJIS.length)];
    s.style.animationDelay = `${Math.random()*0.2}s`;
    wrap.appendChild(s);
  }
  document.body.appendChild(wrap);
  setTimeout(()=>wrap.remove(), 1200);
}

// ════════ RESULT ════════
function showResult() {
  const s = state.score;
  const total = state.totalQ;
  document.getElementById('final-score').textContent = s;
  let emoji, title, stars;
  if (s >= 9) { emoji='🏆'; title='超級棒！你是數學天才！'; stars='⭐⭐⭐'; }
  else if (s >= 7) { emoji='🎉'; title='好棒！繼續加油！'; stars='⭐⭐'; }
  else if (s >= 5) { emoji='😊'; title='不錯喔！再練習一下！'; stars='⭐'; }
  else { emoji='💪'; title='加油！你可以的！'; stars=''; }
  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-stars').textContent = stars;
  showScreen('result');
  if (s>=7) { burstStars(); setTimeout(burstStars,600); }
  setTimeout(()=>speak(title), 400);
}
</script>
