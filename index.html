<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="書本紀錄">
<meta name="theme-color" content="#2C1810">
<title>書本紀錄</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<style>
  :root {
    --ink: #1a0f08; --paper: #faf6f0; --paper2: #f3ece2;
    --amber: #c8832a; --amber-light: #e8a84a; --amber-pale: #fdf0d8;
    --rust: #8b3a2a; --sage: #5a7a5a; --muted: #7a6a5a;
    --border: #ddd0be; --shadow: rgba(44,24,16,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Noto Sans TC', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; overflow-x: hidden; padding-bottom: 80px; }

.header { background: var(–ink); padding: 18px 20px 14px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; gap: 12px; }
.header-title { font-family: ‘Noto Serif TC’, serif; font-size: 1.2rem; font-weight: 700; color: var(–amber-light); letter-spacing: .08em; flex: 1; }
.header-count { font-size: .78rem; color: var(–muted); background: rgba(255,255,255,.08); padding: 4px 10px; border-radius: 20px; }

.tab-bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 200; background: var(–ink); display: flex; padding-bottom: env(safe-area-inset-bottom); border-top: 1px solid rgba(255,255,255,.1); }
.tab { flex: 1; padding: 12px 0 10px; display: flex; flex-direction: column; align-items: center; gap: 4px; color: rgba(255,255,255,.4); font-size: .62rem; letter-spacing: .04em; cursor: pointer; transition: color .2s; background: none; border: none; outline: none; }
.tab.active { color: var(–amber-light); }
.tab svg { width: 22px; height: 22px; }

.page { display: none; }
.page.active { display: block; }

/* Scan zone */
.scan-zone { background: var(–ink); padding: 20px; display: flex; flex-direction: column; gap: 12px; }
.scan-btn { background: var(–amber); color: #fff; border: none; border-radius: 14px; padding: 16px; font-family: ‘Noto Serif TC’, serif; font-size: 1rem; font-weight: 600; letter-spacing: .06em; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; transition: background .2s, transform .1s; }
.scan-btn:active { transform: scale(.97); background: var(–amber-light); }
.or-divider { text-align: center; color: rgba(255,255,255,.3); font-size: .78rem; letter-spacing: .1em; }
.isbn-row { display: flex; gap: 8px; }
.isbn-input { flex: 1; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.15); border-radius: 10px; padding: 12px 14px; color: #fff; font-size: .95rem; font-family: ‘Noto Sans TC’, sans-serif; outline: none; }
.isbn-input::placeholder { color: rgba(255,255,255,.3); }
.isbn-go { background: rgba(200,131,42,.3); border: 1px solid var(–amber); border-radius: 10px; padding: 12px 16px; color: var(–amber-light); font-size: .85rem; cursor: pointer; transition: background .2s; white-space: nowrap; }
.isbn-go:active { background: rgba(200,131,42,.5); }

/* Scanner */
#scannerContainer { display: none; position: relative; border-radius: 14px; overflow: hidden; aspect-ratio: 4/3; background: #000; }
#interactive { width: 100%; height: 100%; }
#interactive video { width: 100%; height: 100%; object-fit: cover; }
#interactive canvas { display: none; }
.scan-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
.scan-frame { width: 70%; height: 40%; border: 2px solid var(–amber-light); border-radius: 8px; box-shadow: 0 0 0 9999px rgba(0,0,0,.5); }
.scan-close { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,.6); color: #fff; border: none; border-radius: 50%; width: 36px; height: 36px; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; pointer-events: all; }

/* Form */
.form-card { margin: 16px; background: #fff; border-radius: 18px; box-shadow: 0 4px 20px var(–shadow); overflow: hidden; }
.form-section { padding: 18px 18px 0; }
.form-section:last-child { padding-bottom: 18px; }
.section-label { font-size: .7rem; font-weight: 500; color: var(–muted); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(–border); }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: .78rem; color: var(–muted); margin-bottom: 5px; }
.field input, .field textarea { width: 100%; background: var(–paper); border: 1.5px solid var(–border); border-radius: 10px; padding: 10px 12px; font-family: ‘Noto Sans TC’, sans-serif; font-size: .9rem; color: var(–ink); outline: none; transition: border-color .2s; resize: none; }
.field input:focus, .field textarea:focus { border-color: var(–amber); }

/* Chips */
.chip-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
.chip { padding: 8px 16px; border-radius: 20px; border: 1.5px solid var(–border); font-size: .82rem; cursor: pointer; background: var(–paper); color: var(–muted); transition: all .2s; white-space: nowrap; }
.chip.active-read { background: var(–sage); border-color: var(–sage); color: #fff; }
.chip.active-note { background: #6a5acd; border-color: #6a5acd; color: #fff; }
.chip.active-borrowed { background: var(–rust); border-color: var(–rust); color: #fff; }

/* URL */
.url-list { margin-bottom: 8px; }
.url-item { display: flex; gap: 8px; align-items: center; padding: 8px 0; border-bottom: 1px solid var(–border); }
.url-item:last-child { border-bottom: none; }
.url-item a { flex: 1; font-size: .82rem; color: var(–amber); text-decoration: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.url-del { background: none; border: none; color: var(–muted); cursor: pointer; font-size: 1.1rem; padding: 2px 4px; }
.add-url-row { display: flex; gap: 8px; }
.add-url-row input { flex: 1; background: var(–paper); border: 1.5px solid var(–border); border-radius: 10px; padding: 9px 12px; font-family: ‘Noto Sans TC’, sans-serif; font-size: .82rem; color: var(–ink); outline: none; }
.add-url-row input:focus { border-color: var(–amber); }
.btn-add-url { background: var(–amber-pale); border: 1.5px solid var(–amber); border-radius: 10px; padding: 9px 14px; color: var(–amber); font-size: .82rem; cursor: pointer; white-space: nowrap; }

/* Save */
.save-btn { margin: 0 16px 20px; width: calc(100% - 32px); background: var(–ink); color: var(–amber-light); border: none; border-radius: 14px; padding: 16px; font-family: ‘Noto Serif TC’, serif; font-size: 1rem; font-weight: 600; letter-spacing: .06em; cursor: pointer; transition: background .2s, transform .1s; }
.save-btn:active { transform: scale(.97); }

/* Fetching badge */
.fetching-badge { display: none; align-items: center; gap: 8px; padding: 10px 14px; background: var(–amber-pale); border-radius: 10px; font-size: .82rem; color: var(–amber); margin-bottom: 12px; }
.fetching-badge.show { display: flex; }
.mini-spin { width: 14px; height: 14px; border: 2px solid rgba(200,131,42,.3); border-top-color: var(–amber); border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Toast */
.toast { position: fixed; top: 70px; left: 50%; transform: translateX(-50%) translateY(-20px); background: var(–ink); color: var(–amber-light); padding: 12px 24px; border-radius: 30px; font-size: .85rem; font-weight: 500; opacity: 0; pointer-events: none; transition: all .3s; z-index: 999; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Library */
.library-toolbar { padding: 14px 16px 10px; display: flex; gap: 8px; align-items: center; }
.search-box { flex: 1; background: #fff; border: 1.5px solid var(–border); border-radius: 10px; padding: 9px 12px; font-family: ‘Noto Sans TC’, sans-serif; font-size: .85rem; color: var(–ink); outline: none; }
.search-box:focus { border-color: var(–amber); }
.filter-bar { padding: 0 16px 12px; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
.filter-bar::-webkit-scrollbar { display: none; }
.filter-chip { padding: 6px 14px; border-radius: 16px; border: 1.5px solid var(–border); font-size: .78rem; cursor: pointer; background: #fff; color: var(–muted); white-space: nowrap; transition: all .2s; }
.filter-chip.on { background: var(–ink); border-color: var(–ink); color: var(–amber-light); }
.book-list { padding: 0 16px; }
.book-card { background: #fff; border-radius: 16px; margin-bottom: 12px; box-shadow: 0 2px 12px var(–shadow); overflow: hidden; cursor: pointer; transition: transform .15s; }
.book-card:active { transform: scale(.98); }
.book-card-inner { display: flex; padding: 14px; gap: 14px; }
.book-cover { width: 56px; height: 78px; border-radius: 6px; overflow: hidden; background: var(–paper2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.book-cover img { width: 100%; height: 100%; object-fit: cover; }
.book-cover-placeholder { font-family: ‘Noto Serif TC’, serif; font-size: 1.6rem; color: var(–amber); }
.book-meta { flex: 1; min-width: 0; }
.book-title { font-family: ‘Noto Serif TC’, serif; font-size: .95rem; font-weight: 600; color: var(–ink); margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.book-author { font-size: .75rem; color: var(–muted); margin-bottom: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.badge-row { display: flex; gap: 5px; flex-wrap: wrap; }
.badge { font-size: .65rem; padding: 3px 8px; border-radius: 10px; font-weight: 500; }
.badge-read { background: #e8f5e8; color: var(–sage); }
.badge-note { background: #ede8ff; color: #6a5acd; }
.badge-borrowed { background: #fde8e8; color: var(–rust); }
.badge-pub { background: var(–amber-pale); color: var(–amber); }
.book-date { font-size: .68rem; color: var(–border); align-self: flex-end; flex-shrink: 0; }
.empty-state { text-align: center; padding: 60px 20px; color: var(–muted); }
.empty-icon { font-size: 3rem; margin-bottom: 14px; }
.empty-text { font-size: .9rem; line-height: 1.6; white-space: pre-line; }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; z-index: 500; background: rgba(26,15,8,.6); backdrop-filter: blur(4px); }
.modal-overlay.open { display: flex; align-items: flex-end; }
.modal-sheet { background: var(–paper); border-radius: 24px 24px 0 0; width: 100%; max-height: 90vh; overflow-y: auto; padding: 20px 20px calc(20px + env(safe-area-inset-bottom)); animation: slideUp .3s ease; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-handle { width: 40px; height: 4px; background: var(–border); border-radius: 2px; margin: 0 auto 18px; }
.modal-title { font-family: ‘Noto Serif TC’, serif; font-size: 1.25rem; font-weight: 700; margin-bottom: 4px; }
.modal-author { font-size: .82rem; color: var(–muted); margin-bottom: 14px; }
.modal-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.modal-section { margin-bottom: 14px; }
.modal-section-title { font-size: .7rem; color: var(–muted); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 6px; }
.modal-section-body { font-size: .88rem; line-height: 1.7; color: var(–ink); background: #fff; border-radius: 10px; padding: 10px 12px; }
.modal-urls { display: flex; flex-direction: column; gap: 6px; }
.modal-url-link { display: flex; align-items: center; gap: 8px; background: var(–amber-pale); border-radius: 10px; padding: 10px 12px; color: var(–amber); font-size: .82rem; text-decoration: none; }
.modal-url-link svg { width: 16px; height: 16px; flex-shrink: 0; }
.modal-actions { display: flex; gap: 10px; margin-top: 18px; }
.btn-edit, .btn-delete { flex: 1; padding: 13px; border-radius: 12px; border: none; font-family: ‘Noto Sans TC’, sans-serif; font-size: .88rem; cursor: pointer; }
.btn-edit { background: var(–ink); color: var(–amber-light); }
.btn-delete { background: #fde8e8; color: var(–rust); }

/* Stats */
.stats-grid { padding: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.stat-card { background: #fff; border-radius: 16px; padding: 16px; box-shadow: 0 2px 12px var(–shadow); }
.stat-card.wide { grid-column: 1 / -1; }
.stat-num { font-family: ‘Noto Serif TC’, serif; font-size: 2.2rem; font-weight: 700; color: var(–amber); }
.stat-label { font-size: .75rem; color: var(–muted); margin-top: 4px; }
.stat-bar-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.stat-bar-name { font-size: .78rem; color: var(–muted); width: 60px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.stat-bar-track { flex: 1; height: 8px; background: var(–paper2); border-radius: 4px; overflow: hidden; }
.stat-bar-fill { height: 100%; border-radius: 4px; background: var(–amber); transition: width .6s ease; }
.stat-bar-count { font-size: .75rem; color: var(–muted); width: 24px; text-align: right; }
</style>

</head>
<body>

<div class="header">
  <span class="header-title">📚 書本紀錄</span>
  <span class="header-count" id="headerCount">0 本</span>
</div>

<!-- ADD PAGE -->

<div class="page active" id="pageAdd">
  <div class="scan-zone">
    <button class="scan-btn" onclick="startScan()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
        <rect x="2" y="6" width="20" height="12" rx="2"/>
        <line x1="7" y1="6" x2="7" y2="18"/><line x1="10" y1="6" x2="10" y2="18"/>
        <line x1="14" y1="6" x2="14" y2="18"/><line x1="17" y1="6" x2="17" y2="18"/>
      </svg>
      掃描書本條碼
    </button>
    <div class="or-divider">— 或手動輸入 ISBN —</div>
    <div class="isbn-row">
      <input class="isbn-input" id="isbnManual" placeholder="9789571234567" type="text" inputmode="numeric">
      <button class="isbn-go" onclick="lookupISBN()">查詢</button>
    </div>
    <div id="scannerContainer">
      <div id="interactive"></div>
    </div>
  </div>

  <div class="form-card">
    <div class="form-section">
      <div class="section-label">書本資訊</div>
      <div class="fetching-badge" id="fetchingBadge">
        <div class="mini-spin"></div>
        正在查詢書目資料…
      </div>
      <div class="field"><label>書名 *</label><input type="text" id="fTitle" placeholder="請輸入書名"></div>
      <div class="field"><label>作者</label><input type="text" id="fAuthor" placeholder="作者名稱"></div>
      <div class="field"><label>出版社</label><input type="text" id="fPublisher" placeholder="出版社名稱"></div>
      <div class="field"><label>ISBN</label><input type="text" id="fISBN" placeholder="條碼 / ISBN"></div>
    </div>
    <div class="form-section">
      <div class="section-label">狀態標記</div>
      <div class="chip-row">
        <div class="chip" id="chipRead" onclick="toggleChip('read')">✅ 已閱讀</div>
        <div class="chip" id="chipNote" onclick="toggleChip('note')">🔤 注音</div>
        <div class="chip" id="chipBorrowed" onclick="toggleChip('borrowed')">📦 已借閱</div>
      </div>
    </div>
    <div class="form-section">
      <div class="section-label">備註</div>
      <div class="field"><textarea id="fNotes" rows="3" placeholder="心得、適合年齡、推薦原因…"></textarea></div>
    </div>
    <div class="form-section">
      <div class="section-label">相關網址</div>
      <div class="url-list" id="urlList"></div>
      <div class="add-url-row">
        <input type="url" id="urlInput" placeholder="https://youtube.com/...">
        <button class="btn-add-url" onclick="addURL()">＋ 加入</button>
      </div>
    </div>
  </div>
  <button class="save-btn" onclick="saveBook()">儲存書本</button>
</div>

<!-- LIBRARY PAGE -->

<div class="page" id="pageLibrary">
  <div class="library-toolbar">
    <input class="search-box" id="searchBox" placeholder="🔍 搜尋書名、作者…" oninput="renderLibrary()">
  </div>
  <div class="filter-bar">
    <div class="filter-chip on" data-filter="all" onclick="setFilter('all')">全部</div>
    <div class="filter-chip" data-filter="read" onclick="setFilter('read')">已閱讀</div>
    <div class="filter-chip" data-filter="note" onclick="setFilter('note')">注音</div>
    <div class="filter-chip" data-filter="borrowed" onclick="setFilter('borrowed')">已借閱</div>
  </div>
  <div class="book-list" id="bookList"></div>
</div>

<!-- STATS PAGE -->

<div class="page" id="pageStats">
  <div class="stats-grid" id="statsGrid"></div>
</div>

<!-- MODAL -->

<div class="modal-overlay" id="detailModal" onclick="closeModal(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div id="modalContent"></div>
  </div>
</div>

<!-- TAB BAR -->

<div class="tab-bar">
  <button class="tab active" id="tabAdd" onclick="switchTab('add')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    新增
  </button>
  <button class="tab" id="tabLibrary" onclick="switchTab('library')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
    書單
  </button>
  <button class="tab" id="tabStats" onclick="switchTab('stats')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    統計
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'booktracker_v2';
let books = [];
let editingId = null;
let currentFilter = 'all';
let pendingURLs = [];
let chipState = { read: false, note: false, borrowed: false };

function loadBooks() {
  try { books = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { books = []; }
}
function saveBooks() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(books));
  updateHeaderCount();
}
function updateHeaderCount() {
  document.getElementById('headerCount').textContent = books.length + ' 本';
}

function switchTab(tab) {
  ['add','library','stats'].forEach(t => {
    document.getElementById('page'+t[0].toUpperCase()+t.slice(1)).classList.remove('active');
    document.getElementById('tab'+t[0].toUpperCase()+t.slice(1)).classList.remove('active');
  });
  document.getElementById('page'+tab[0].toUpperCase()+tab.slice(1)).classList.add('active');
  document.getElementById('tab'+tab[0].toUpperCase()+tab.slice(1)).classList.add('active');
  if (tab === 'library') renderLibrary();
  if (tab === 'stats') renderStats();
}

// ── SCANNER ──
let scannerRunning = false;
function startScan() {
  const c = document.getElementById('scannerContainer');
  if (scannerRunning) { stopScan(); return; }
  c.style.display = 'block';
  if (!c.querySelector('.scan-overlay')) {
    const ov = document.createElement('div'); ov.className = 'scan-overlay';
    ov.innerHTML = '<div class="scan-frame"></div>'; c.appendChild(ov);
    const cb = document.createElement('button'); cb.className = 'scan-close';
    cb.innerHTML = '✕'; cb.onclick = stopScan; c.appendChild(cb);
  }
  Quagga.init({
    inputStream: { name:'Live', type:'LiveStream', target: document.getElementById('interactive'), constraints: { facingMode:'environment', width:640, height:480 } },
    decoder: { readers: ['ean_reader','ean_8_reader'] }, locate: true
  }, err => {
    if (err) { showToast('無法開啟相機，請確認已在 HTTPS 網域'); c.style.display='none'; return; }
    Quagga.start(); scannerRunning = true;
  });
  Quagga.onDetected(r => {
    const code = r.codeResult.code;
    if (code && code.length >= 10) {
      stopScan();
      document.getElementById('fISBN').value = code;
      document.getElementById('isbnManual').value = code;
      fetchBookByISBN(code);
    }
  });
}
function stopScan() {
  if (scannerRunning) { try { Quagga.stop(); } catch(e){} scannerRunning = false; }
  document.getElementById('scannerContainer').style.display = 'none';
}

// ── ISBN LOOKUP (Google Books API) ──
function lookupISBN() {
  const val = document.getElementById('isbnManual').value.trim().replace(/-/g,'');
  if (!val) { showToast('請輸入 ISBN'); return; }
  document.getElementById('fISBN').value = val;
  fetchBookByISBN(val);
}

async function fetchBookByISBN(isbn) {
  const badge = document.getElementById('fetchingBadge');
  badge.classList.add('show');
  try {
    const res = await fetch('https://www.googleapis.com/books/v1/volumes?q=isbn:' + isbn);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data.totalItems > 0 && data.items && data.items.length > 0) {
      const info = data.items[0].volumeInfo;
      if (info.title) document.getElementById('fTitle').value = info.title;
      if (info.authors && info.authors.length) document.getElementById('fAuthor').value = info.authors.join('、');
      if (info.publisher) document.getElementById('fPublisher').value = info.publisher;
      showToast('✓ 書目資料已匯入');
    } else {
      showToast('查無此書，請手動填寫');
    }
  } catch(e) {
    showToast('查詢失敗，請確認網路連線');
  } finally {
    badge.classList.remove('show');
  }
}

// ── CHIPS ──
function toggleChip(type) {
  chipState[type] = !chipState[type];
  const el = document.getElementById('chip'+type[0].toUpperCase()+type.slice(1));
  el.className = 'chip' + (chipState[type] ? ' active-'+type : '');
}

// ── URLS ──
function addURL() {
  const input = document.getElementById('urlInput');
  let url = input.value.trim();
  if (!url) return;
  if (!url.startsWith('http')) url = 'https://' + url;
  pendingURLs.push(url);
  renderURLList();
  input.value = '';
}
function removeURL(i) { pendingURLs.splice(i,1); renderURLList(); }
function renderURLList() {
  document.getElementById('urlList').innerHTML = pendingURLs.map((u,i) =>
    '<div class="url-item"><a href="'+u+'" target="_blank">'+u+'</a><button class="url-del" onclick="removeURL('+i+')">✕</button></div>'
  ).join('');
}

// ── SAVE ──
function saveBook() {
  const title = document.getElementById('fTitle').value.trim();
  if (!title) { showToast('請輸入書名'); return; }
  const book = {
    id: editingId || Date.now().toString(),
    title, author: document.getElementById('fAuthor').value.trim(),
    publisher: document.getElementById('fPublisher').value.trim(),
    isbn: document.getElementById('fISBN').value.trim(),
    isRead: chipState.read, hasNote: chipState.note, isBorrowed: chipState.borrowed,
    notes: document.getElementById('fNotes').value.trim(),
    urls: [...pendingURLs],
    date: editingId ? (books.find(b=>b.id===editingId)?.date || new Date().toISOString()) : new Date().toISOString()
  };
  if (editingId) {
    const idx = books.findIndex(b=>b.id===editingId);
    books[idx] = book; editingId = null; showToast('✓ 已更新書本');
  } else {
    books.unshift(book); showToast('✓ 書本已儲存');
  }
  saveBooks(); resetForm();
}

function resetForm() {
  ['fTitle','fAuthor','fPublisher','fISBN','fNotes','urlInput','isbnManual'].forEach(id => { document.getElementById(id).value = ''; });
  chipState = { read:false, note:false, borrowed:false };
  ['Read','Note','Borrowed'].forEach(t => { document.getElementById('chip'+t).className = 'chip'; });
  pendingURLs = []; renderURLList();
}

// ── LIBRARY ──
function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-chip').forEach(el => el.classList.toggle('on', el.dataset.filter===f));
  renderLibrary();
}
function renderLibrary() {
  const q = document.getElementById('searchBox').value.toLowerCase();
  const list = books.filter(b => {
    const match = !q || b.title.toLowerCase().includes(q) || (b.author||'').toLowerCase().includes(q) || (b.publisher||'').toLowerCase().includes(q);
    if (!match) return false;
    if (currentFilter==='read') return b.isRead;
    if (currentFilter==='note') return b.hasNote;
    if (currentFilter==='borrowed') return b.isBorrowed;
    return true;
  });
  const el = document.getElementById('bookList');
  if (!list.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📖</div><div class="empty-text">'+(books.length===0?'還沒有書本紀錄\n點擊「新增」開始記錄吧！':'沒有符合條件的書本')+'</div></div>';
    return;
  }
  el.innerHTML = list.map(b => {
    const badges = [
      b.isRead?'<span class="badge badge-read">已閱讀</span>':'',
      b.hasNote?'<span class="badge badge-note">注音</span>':'',
      b.isBorrowed?'<span class="badge badge-borrowed">已借閱</span>':'',
      b.publisher?'<span class="badge badge-pub">'+b.publisher+'</span>':''
    ].filter(Boolean).join('');
    const d = new Date(b.date).toLocaleDateString('zh-TW',{month:'numeric',day:'numeric'});
    return '<div class="book-card" onclick="openDetail(\''+b.id+'\')"><div class="book-card-inner"><div class="book-cover"><span class="book-cover-placeholder">'+b.title[0]+'</span></div><div class="book-meta"><div class="book-title">'+b.title+'</div><div class="book-author">'+(b.author||b.publisher||'—')+'</div><div class="badge-row">'+badges+'</div></div><div class="book-date">'+d+'</div></div></div>';
  }).join('');
}

// ── MODAL ──
function openDetail(id) {
  const b = books.find(x=>x.id===id); if(!b) return;
  const badges = [
    b.isRead?'<span class="badge badge-read">✅ 已閱讀</span>':'',
    b.hasNote?'<span class="badge badge-note">🔤 注音</span>':'',
    b.isBorrowed?'<span class="badge badge-borrowed">📦 已借閱</span>':'',
    b.publisher?'<span class="badge badge-pub">'+b.publisher+'</span>':''
  ].filter(Boolean).join('');
  const urlsHTML = b.urls&&b.urls.length ? '<div class="modal-section"><div class="modal-section-title">相關網址</div><div class="modal-urls">'+b.urls.map(u=>'<a href="'+u+'" target="_blank" class="modal-url-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>'+(u.length>45?u.slice(0,45)+'…':u)+'</a>').join('')+'</div></div>':'' ;
  const notesHTML = b.notes ? '<div class="modal-section"><div class="modal-section-title">備註</div><div class="modal-section-body">'+b.notes.replace(/\n/g,'<br>')+'</div></div>' : '';
  const isbnHTML = b.isbn ? '<div class="modal-section"><div class="modal-section-title">ISBN</div><div class="modal-section-body" style="font-family:monospace">'+b.isbn+'</div></div>' : '';
  document.getElementById('modalContent').innerHTML =
    '<div class="modal-title">'+b.title+'</div>'+
    '<div class="modal-author">'+([b.author,b.publisher].filter(Boolean).join(' · ')||'—')+'</div>'+
    '<div class="modal-badges">'+(badges||'<span class="badge badge-pub">未標記</span>')+'</div>'+
    notesHTML+urlsHTML+isbnHTML+
    '<div class="modal-actions"><button class="btn-edit" onclick="editBook(\''+id+'\')">✏️ 編輯</button><button class="btn-delete" onclick="deleteBook(\''+id+'\')">🗑 刪除</button></div>';
  document.getElementById('detailModal').classList.add('open');
}
function closeModal(e) { if(e.target===e.currentTarget) document.getElementById('detailModal').classList.remove('open'); }
function editBook(id) {
  document.getElementById('detailModal').classList.remove('open');
  const b = books.find(x=>x.id===id); if(!b) return;
  editingId = id;
  document.getElementById('fTitle').value = b.title;
  document.getElementById('fAuthor').value = b.author||'';
  document.getElementById('fPublisher').value = b.publisher||'';
  document.getElementById('fISBN').value = b.isbn||'';
  document.getElementById('fNotes').value = b.notes||'';
  chipState = { read:b.isRead, note:b.hasNote, borrowed:b.isBorrowed };
  ['read','note','borrowed'].forEach(t => {
    const el = document.getElementById('chip'+t[0].toUpperCase()+t.slice(1));
    el.className = 'chip' + (chipState[t] ? ' active-'+t : '');
  });
  pendingURLs = [...(b.urls||[])]; renderURLList();
  switchTab('add');
  window.scrollTo({top:0,behavior:'smooth'});
  showToast('正在編輯：'+b.title);
}
function deleteBook(id) {
  const b = books.find(x=>x.id===id);
  if(!confirm('確定要刪除《'+b?.title+'》嗎？')) return;
  books = books.filter(x=>x.id!==id); saveBooks();
  document.getElementById('detailModal').classList.remove('open');
  renderLibrary(); showToast('已刪除');
}

// ── STATS ──
function renderStats() {
  const total = books.length;
  const read = books.filter(b=>b.isRead).length;
  const note = books.filter(b=>b.hasNote).length;
  const borrowed = books.filter(b=>b.isBorrowed).length;
  const pubMap = {};
  books.forEach(b => { const p = b.publisher||'未知'; pubMap[p]=(pubMap[p]||0)+1; });
  const topPubs = Object.entries(pubMap).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxPub = topPubs[0]?.[1]||1;
  const pubBars = topPubs.map(([name,cnt])=>
    '<div class="stat-bar-item"><div class="stat-bar-name">'+name+'</div><div class="stat-bar-track"><div class="stat-bar-fill" style="width:'+(cnt/maxPub*100)+'%"></div></div><div class="stat-bar-count">'+cnt+'</div></div>'
  ).join('');
  document.getElementById('statsGrid').innerHTML =
    '<div class="stat-card"><div class="stat-num">'+total+'</div><div class="stat-label">總書本數</div></div>'+
    '<div class="stat-card"><div class="stat-num">'+read+'</div><div class="stat-label">已閱讀</div></div>'+
    '<div class="stat-card"><div class="stat-num">'+note+'</div><div class="stat-label">注音書</div></div>'+
    '<div class="stat-card"><div class="stat-num">'+borrowed+'</div><div class="stat-label">已借閱</div></div>'+
    (topPubs.length?'<div class="stat-card wide"><div class="section-label" style="font-size:.7rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px">出版社分佈</div>'+pubBars+'</div>':'');
}

// ── TOAST ──
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
}

// ── INIT ──
loadBooks(); updateHeaderCount();
</script>
