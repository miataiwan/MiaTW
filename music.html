<title>歌詞單字學習 — Proud of You</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #0d0a1a; --card: #13102a; --card2: #1e1a38;
  --rose: #f472b6; --gold: #ffd166; --sky: #93c5fd;
  --purple: #c084fc; --green: #34d399;
  --text: #f0eaff; --muted: #7b6fa0;
  --radius: 16px;
}
html, body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100dvh; overflow-x: hidden; user-select: none;
}
/* subtle gradient bg */
body::before {
  content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 60% 40% at 20% 10%, rgba(196,132,252,0.08) 0%, transparent 70%),
    radial-gradient(ellipse 50% 30% at 80% 80%, rgba(244,114,182,0.07) 0%, transparent 70%);
}

/* HEADER */
.header {
position: sticky; top: 0; z-index: 100;
background: rgba(13,10,26,0.94); backdrop-filter: blur(20px);
padding: 14px 20px 12px; display: flex; align-items: center; gap: 12px;
border-bottom: 1px solid rgba(255,255,255,0.07);
}
.album-art {
width: 46px; height: 46px; border-radius: 14px; flex-shrink: 0;
background: linear-gradient(135deg, #2a1060, #5b1a6e);
display: flex; align-items: center; justify-content: center; font-size: 24px;
box-shadow: 0 0 0 2px rgba(196,132,252,0.4), 0 4px 16px rgba(196,132,252,0.2);
animation: float 5s ease-in-out infinite;
}
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
.song-info { flex: 1; min-width: 0; }
.song-title { font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.song-artist { font-size: 12px; color: var(–muted); margin-top: 2px; }
.sing-btn {
background: linear-gradient(135deg, var(–purple), #9333ea);
border: none; border-radius: 22px; padding: 9px 16px; color: #fff;
font-weight: 800; font-size: 13px; cursor: pointer; flex-shrink: 0;
display: flex; align-items: center; gap: 5px;
box-shadow: 0 4px 15px rgba(196,132,252,0.35); transition: transform .15s;
}
.sing-btn:active { transform: scale(0.95); }
.sing-btn.playing { background: linear-gradient(135deg, var(–rose), #be185d); }

/* YouTube */
.yt-bar {
background: rgba(13,10,26,0.96); border-bottom: 1px solid rgba(255,255,255,0.06);
padding: 10px 16px; position: sticky; top: 73px; z-index: 99;
}
.yt-label { font-size: 11px; color: var(–muted); margin-bottom: 6px; letter-spacing: 0.5px; }
.yt-embed { width: 100%; height: 56px; border-radius: 10px; overflow: hidden; border: none; display: block; }

/* progress */
.progress-bar { height: 2px; background: rgba(255,255,255,0.07); }
.progress-fill {
height: 100%; width: 0%;
background: linear-gradient(90deg, var(–purple), var(–rose));
box-shadow: 0 0 8px var(–purple); transition: width 0.4s linear;
}

/* LYRICS */
.lyrics-container {
padding: 12px 16px 130px; display: flex; flex-direction: column; gap: 10px;
position: relative; z-index: 1;
}
.line-block {
background: var(–card); border-radius: var(–radius); padding: 14px 16px;
border: 1px solid rgba(255,255,255,0.05); cursor: pointer;
transition: background .3s, border-color .3s, transform .2s; position: relative;
}
.line-block::before {
content: ‘’; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
background: linear-gradient(180deg, var(–purple), var(–rose));
opacity: 0; transition: opacity .3s; border-radius: 3px 0 0 3px;
}
.line-block.active {
background: rgba(196,132,252,0.09);
border-color: rgba(196,132,252,0.25); transform: scale(1.01);
}
.line-block.active::before { opacity: 1; }

.section-label {
font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
color: var(–rose); text-transform: uppercase; margin-bottom: 6px; opacity: 0.8;
}
.english-line { display: flex; flex-wrap: wrap; gap: 5px 4px; margin-bottom: 8px; }
.word {
background: var(–card2); border: 1px solid rgba(255,255,255,0.08);
border-radius: 8px; padding: 5px 10px; font-size: 16px; font-weight: 600;
color: var(–text); cursor: pointer; transition: background .15s, transform .1s;
}
.word:active { transform: scale(0.88); }
.word.speaking {
background: rgba(196,132,252,0.22); border-color: var(–purple); color: var(–purple);
animation: pw .4s ease;
}
.word.lit {
background: rgba(244,114,182,0.15); border-color: rgba(244,114,182,0.45); color: var(–rose);
}
@keyframes pw { 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }
.chinese-line { font-size: 13px; color: var(–gold); font-weight: 500; line-height: 1.7; padding-left: 2px; }

/* TOOLTIP */
.tooltip {
position: fixed; z-index: 200; background: #1a1030;
border: 1px solid rgba(196,132,252,0.4); border-radius: 14px; padding: 14px 16px;
pointer-events: none; opacity: 0; transform: translateY(8px) scale(0.94);
transition: opacity .2s, transform .2s; max-width: 230px;
box-shadow: 0 12px 40px rgba(0,0,0,0.65);
}
.tooltip.show { opacity: 1; transform: translateY(0) scale(1); }
.tt-word { font-size: 19px; font-weight: 800; color: var(–purple); }
.tt-phonetic { font-size: 12px; color: var(–muted); margin-top: 2px; }
.tt-meaning { font-size: 15px; color: var(–gold); margin-top: 7px; font-weight: 700; }
.tt-example { font-size: 12px; color: var(–muted); margin-top: 5px; font-style: italic; line-height: 1.5; }

/* PLAYER */
.player-bar {
position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
background: rgba(13,10,26,0.97); backdrop-filter: blur(24px);
border-top: 1px solid rgba(255,255,255,0.08);
padding: 12px 20px; padding-bottom: max(12px, env(safe-area-inset-bottom));
}
.player-controls { display: flex; align-items: center; justify-content: center; gap: 24px; }
.ctrl-btn {
background: none; border: none; color: var(–muted); font-size: 22px;
cursor: pointer; padding: 8px; transition: color .15s, transform .15s;
}
.ctrl-btn:active { transform: scale(0.85); color: var(–text); }
.play-main {
width: 54px; height: 54px; border-radius: 50%; flex-shrink: 0;
background: linear-gradient(135deg, var(–purple), #9333ea);
border: none; color: #fff; font-size: 22px;
display: flex; align-items: center; justify-content: center; cursor: pointer;
box-shadow: 0 4px 20px rgba(196,132,252,0.45); transition: transform .15s;
}
.play-main:active { transform: scale(0.92); }
.play-main.playing { background: linear-gradient(135deg, var(–green), #059669); box-shadow: 0 4px 20px rgba(52,211,153,0.4); }
.speed-badge {
background: var(–card2); border: 1px solid rgba(255,255,255,0.12);
border-radius: 8px; padding: 6px 10px; font-size: 12px; font-weight: 700;
cursor: pointer; min-width: 38px; text-align: center;
}
.speed-badge.slow { color: var(–gold); border-color: rgba(255,209,102,0.3); }

/* HINT */
.hint {
position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
background: rgba(196,132,252,0.13); border: 1px solid rgba(196,132,252,0.3);
border-radius: 20px; padding: 8px 18px; font-size: 13px; color: var(–purple);
opacity: 0; transition: opacity .4s; pointer-events: none; white-space: nowrap; z-index: 300;
}
.hint.show { opacity: 1; }
</style>

</head>

          span.className = 'word';

            e.stopPropagation();
            speakWord(word, span);
          };
          eng.appendChild(span);
        })(wi, line.en[wi]);

      zh.textContent = line.zh;

  }

  setTimeout(function() {
    var h = document.getElementById('hint');
    h.classList.add('show');
    setTimeout(function(){ h.classList.remove('show'); }, 3500);
  }, 1000);
}

/* ── SPEECH: 同步修正
   使用 onend 回調驅動播放，不再用 setTimeout 估時間 */
function speak(text, rate, onEnd) {
  if (!window.speechSynthesis) { if (onEnd) setTimeout(onEnd, 800); return; }
  speechSynthesis.cancel();

  // iOS Safari 需稍等才能 cancel 乾淨
  setTimeout(function() {
    var utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'en-US';
    utt.rate = (rate || 1) * speed;
    utt.pitch = 1.05;
    if (onEnd) {
      utt.onend = onEnd;
      // 保險：若 onend 沒觸發（部分瀏覽器 bug），用估計時間補觸發
      var wordCount = text.split(' ').length;
      var estimatedMs = (wordCount / utt.rate) * 700 + 600;
      var safeTimer = setTimeout(function() {
        if (onEnd) { var cb = onEnd; onEnd = null; utt.onend = null; cb(); }
      }, estimatedMs);
      utt.onend = function() {
        clearTimeout(safeTimer);
        if (onEnd) { var cb = onEnd; onEnd = null; cb(); }
      };
    }
    uttRef = utt;
    speechSynthesis.speak(utt);
  }, 50);
}

function speakWord(word, el) {
  var all = document.querySelectorAll('.word.speaking');
  for (var i = 0; i < all.length; i++) all[i].classList.remove('speaking');
  el.classList.add('speaking');
  var timeout = setTimeout(function(){ el.classList.remove('speaking'); }, 900);

  // speak word only, no completion callback needed
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  setTimeout(function() {
    var utt = new SpeechSynthesisUtterance(word);
    utt.lang = 'en-US'; utt.rate = 0.82 * speed; utt.pitch = 1.05;
    speechSynthesis.speak(utt);
  }, 50);

  var key = word.toLowerCase().replace(/[',]/g,'');
  var info = dict[word.toLowerCase()] || dict[key];
  showTooltip(el, word, info);
}

function showTooltip(el, word, info) {
  var tt = document.getElementById('tooltip');
  document.getElementById('ttWord').textContent = word;
  document.getElementById('ttPhonetic').textContent = info ? info.ph : '';
  document.getElementById('ttMeaning').textContent = info ? info.zh : '（查看字典）';
  document.getElementById('ttExample').textContent = info ? info.ex : '';
  var rect = el.getBoundingClientRect();
  var top = rect.bottom + 8;
  var left = rect.left;
  if (left + 235 > window.innerWidth - 8) left = window.innerWidth - 243;
  if (top + 140 > window.innerHeight) top = rect.top - 145;
  tt.style.left = Math.max(8, left) + 'px';
  tt.style.top = top + 'px';
  tt.classList.add('show');
  clearTimeout(tt._t);
  tt._t = setTimeout(function(){ tt.classList.remove('show'); }, 3200);
}

function clearLit() {
  var lit = document.querySelectorAll('.word.lit');
  for (var i = 0; i < lit.length; i++) lit[i].classList.remove('lit');
}

/* 卡拉OK亮字：根據語音實際時長用 onboundary 或分段估算 */
function animateKaraoke(li, totalMs) {
  for (var i = 0; i < wordTimers.length; i++) clearTimeout(wordTimers[i]);
  wordTimers = [];
  clearLit();
  var words = lyrics[li].en;
  var pw = totalMs / words.length;
  for (var wi = 0; wi < words.length; wi++) {
    (function(wordIdx, lineIdx) {
      wordTimers.push(setTimeout(function() {
        var el = document.getElementById('w-' + lineIdx + '-' + wordIdx);
        if (el) el.classList.add('lit');
      }, wordIdx * pw));
    })(wi, li);
  }
}

function setActiveLine(idx) {
  var active = document.querySelectorAll('.line-block.active');
  for (var i = 0; i < active.length; i++) active[i].classList.remove('active');
  clearLit();
  currentLine = idx;
  if (idx < 0) return;
  var block = document.getElementById('line-' + idx);
  if (block) {
    block.classList.add('active');
    block.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
  document.getElementById('progressFill').style.width =
    ((idx + 1) / lyrics.length * 100) + '%';
}

function playLine(idx, onDone) {
  var line = lyrics[idx];
  var text = line.en.join(' ');
  var wordCount = line.en.length;

  // 先估算時長給卡拉OK亮字用（0.9 rate，每字約 280ms + 400ms 緩衝）
  var estimatedMs = (wordCount / (0.9 * speed)) * 280 + 400;
  animateKaraoke(idx, estimatedMs);

  speak(text, 0.9, function() {
    if (onDone) onDone();
  });
}

function togglePlay() {
  if (isPlaying) { pausePlayback(); } else { startPlayback(); }
}

function startPlayback() {
  isPlaying = true;
  document.getElementById('playMain').classList.add('playing');
  document.getElementById('playMain').textContent = '⏸';
  if (currentLine < 0 || currentLine >= lyrics.length - 1) currentLine = -1;
  playNext();
}

function pausePlayback() {
  isPlaying = false;
  isSinging = false;
  document.getElementById('playMain').classList.remove('playing');
  document.getElementById('playMain').textContent = '▶';
  document.getElementById('singBtn').classList.remove('playing');
  document.getElementById('singLabel').textContent = '唱整首';
  if (window.speechSynthesis) speechSynthesis.cancel();
  for (var i = 0; i < wordTimers.length; i++) clearTimeout(wordTimers[i]);
}

function playNext() {
  if (!isPlaying) return;
  var next = currentLine + 1;
  if (next >= lyrics.length) {
    pausePlayback();
    document.getElementById('progressFill').style.width = '100%';
    return;
  }
  setActiveLine(next);
  playLine(next, function() {
    if (!isPlaying) return;
    // 句間短停頓 400ms
    setTimeout(playNext, 400);
  });
}

function jumpToLine(idx) {
  pausePlayback();
  setActiveLine(idx);
}
function prevLine() { jumpToLine(Math.max(0, currentLine <= 0 ? 0 : currentLine - 1)); }
function nextLine() {
  var t = currentLine < 0 ? 0 : Math.min(lyrics.length - 1, currentLine + 1);
  jumpToLine(t);
}
function replayLine() {
  if (currentLine < 0) { jumpToLine(0); return; }
  if (window.speechSynthesis) speechSynthesis.cancel();
  for (var i = 0; i < wordTimers.length; i++) clearTimeout(wordTimers[i]);
  clearLit();
  playLine(currentLine, null);
}

function toggleSing() {
  if (isSinging) {
    isSinging = false;
    pausePlayback();
  } else {
    isSinging = true;
    document.getElementById('singBtn').classList.add('playing');
    document.getElementById('singLabel').textContent = '停止';
    currentLine = -1;
    startPlayback();
  }
}

function toggleSpeed() {
  speed = speed === 1 ? 0.65 : 1;
  var badge = document.getElementById('speedBadge');
  badge.textContent = speed === 1 ? '1×' : '0.65×';
  badge.className = speed < 1 ? 'speed-badge slow' : 'speed-badge';
  var h = document.getElementById('hint');
  h.textContent = speed < 1 ? '🐢 慢速練習模式' : '⚡ 正常速度';
  h.classList.add('show');
  setTimeout(function(){ h.classList.remove('show'); }, 2500);
}

document.addEventListener('click', function(e) {
  if (!e.target.classList.contains('word'))
    document.getElementById('tooltip').classList.remove('show');
});

init();
</script>
